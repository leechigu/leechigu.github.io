<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이치구 | Resume</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #222;
    }
    h1 {
      margin-bottom: 8px;
    }
    .sub {
      color: #666;
      margin-bottom: 24px;
    }
    .box {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
    }
    .btns {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    a.button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid #222;
      color: #222;
    }
    a.button:hover {
      background: #222;
      color: white;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>이치구</h1>
    <div class="sub">Backend Developer | Java, Spring, AWS, Kubernetes</div>

    <p>
      안녕하세요. 서비스의 안정성과 확장성을 중요하게 생각하는 백엔드 개발자입니다.
      Java/Spring 기반 개발을 중심으로 데이터베이스, 인프라, 협업까지 폭넓게 다루는 것을 지향합니다.
    </p>

    <p>
      아래에서 이력서 PDF를 바로 확인하실 수 있습니다.
    </p>

    <div class="btns">
      <a class="button" href="./resume.pdf" target="_blank">이력서 보기</a>
      <a class="button" href="./resume.pdf" download>이력서 다운로드</a>
      <a class="button" href="https://github.com/leechigu" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
